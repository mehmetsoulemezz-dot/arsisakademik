function MesajlarTab({user, toast_}) {
  const [posts, setPosts] = useState([]);
  const [konu, setKonu] = useState("");
  const [icerik, setIcerik] = useState("");
  const [yanitlar, setYanitlar] = useState({});

  useEffect(()=>{ yukle(); },[]);

  const yukle = async () => {
    const {data} = await supa.from("messages").select("*").order("created_at",{ascending:false});
    if(data) setPosts(data);
  };

  const gonder = async () => {
    if(!konu.trim()||!icerik.trim()){toast_("Konu ve mesaj zorunludur.","err");return;}
    await supa.from("messages").insert([{
      from_name:user.name, from_email:user.email,
      to_email:"forum", subject:konu, content:icerik, read:false
    }]);
    setKonu(""); setIcerik(""); yukle();
    toast_("Mesajiniz gonderildi!");
  };

  const yanitGonder = async (postId, postFromEmail) => {
    const text = yanitlar[postId]||"";
    if(!text.trim()) return;
    await supa.from("messages").insert([{
      from_name:user.name, from_email:user.email,
      to_email:`reply_${postId}`, subject:"Yanit", content:text,
      read:false, reply_to_user: postFromEmail
    }]);
    setYanitlar(prev=>({...prev,[postId]:""}));
    yukle();
    toast_("Yanitiniz eklendi!");
  };

  const isEditor = user?.role==="editor";

  // Editör tüm ana postları görür
  // Kullanıcı sadece kendi postlarını görür
  const anaPostlar = posts
    .filter(p=>p.to_email==="forum")
    .filter(p=> isEditor ? true : p.from_email===user.email);

  const yanit = (id) => posts
    .filter(p=>p.to_email===`reply_${id}`)
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));

  // Editör için okunmamış sayısı
  const okunmamis = isEditor ? posts.filter(p=>p.to_email==="forum"&&!p.read).length : 0;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <h3 style={{fontFamily:"'Cinzel',serif",margin:0,fontSize:17,letterSpacing:1,color:C.ink}}>MESAJLAR</h3>
        {isEditor && okunmamis>0 && (
          <div style={{background:`${C.rust}15`,border:`1px solid ${C.rust}44`,borderRadius:8,padding:"8px 16px",display:"flex",alignItems:"center",gap:8}}>
            <span style={{background:C.rust,color:"#fff",borderRadius:"50%",width:22,height:22,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800}}>{okunmamis}</span>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.rust,letterSpacing:0.5}}>okunmamis mesaj</span>
          </div>
        )}
      </div>

      {/* Yeni mesaj kutusu */}
      <div style={{background:C.cream,borderRadius:12,padding:"20px 24px",marginBottom:28,border:`1px solid ${C.border}`}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.rust,letterSpacing:1.5,marginBottom:14}}>YENI MESAJ</div>
        <input value={konu} onChange={e=>setKonu(e.target.value)} placeholder="Konu *" style={{...INP,marginBottom:10}}/>
        <textarea value={icerik} onChange={e=>setIcerik(e.target.value)} placeholder="Mesajiniz *" style={{...INP,height:90,resize:"vertical",marginBottom:10}}/>
        <button onClick={gonder} style={{background:C.ink,color:C.gold,border:"none",padding:"10px 24px",borderRadius:7,cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,letterSpacing:1}}>GONDER</button>
      </div>

      {anaPostlar.length===0
        ? <div style={{textAlign:"center",padding:"40px",color:C.muted,fontStyle:"italic"}}>Henuz mesaj yok.</div>
        : anaPostlar.map(p=>{
          const okunmadı = !p.read && isEditor;
          return(
            <div key={p.id} style={{border:`1px solid ${okunmadı?C.rust:C.border}`,borderRadius:12,marginBottom:16,overflow:"hidden",boxShadow:okunmadı?`0 0 0 2px ${C.rust}22`:"none"}}>
              <div style={{background:okunmadı?`${C.rust}06`:"#fff",padding:"18px 22px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,alignItems:"flex-start"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,color:C.ink}}>{p.subject}</span>
                    {okunmadı&&<span style={{background:C.rust,color:"#fff",fontSize:9,padding:"2px 8px",borderRadius:20,fontWeight:700}}>YENI</span>}
                  </div>
                  <span style={{fontSize:11,color:C.muted,whiteSpace:"nowrap",marginLeft:12}}>{p.created_at?.split("T")[0]}</span>
                </div>
                {isEditor&&<div style={{fontSize:11,color:C.teal,marginBottom:6,fontWeight:600}}>Gonderen: {p.from_name} ({p.from_email})</div>}
                <div style={{fontSize:12,color:C.muted,marginBottom:10,fontStyle:"italic"}}>— {p.from_name}</div>
                <p style={{margin:0,fontSize:14,color:"#444",lineHeight:1.75}}>{p.content}</p>
              </div>

              {/* Yanıtlar */}
              {yanit(p.id).length>0&&(
                <div style={{background:C.cream,borderTop:`1px solid ${C.border}`}}>
                  {yanit(p.id).map(r=>(
                    <div key={r.id} style={{padding:"12px 22px",borderBottom:`1px solid ${C.border}44`,background:r.from_email===user.email?"#fff":C.cream}}>
                      <div style={{fontSize:12,color:r.from_email===user.email?C.rust:C.teal,marginBottom:4,fontWeight:600}}>{r.from_email===user.email?"Siz":"Editordan"} · {r.created_at?.split("T")[0]}</div>
                      <p style={{margin:0,fontSize:13.5,color:"#444",lineHeight:1.7}}>{r.content}</p>
                    </div>
                  ))}
                </div>
              )}

              {/* Yanıt kutusu — editör her mesaja, kullanıcı kendi mesajına */}
              {(isEditor || p.from_email===user.email) && (
                <div style={{background:C.paper,borderTop:`1px solid ${C.border}`,padding:"12px 22px",display:"flex",gap:10}}>
                  <input
                    value={yanitlar[p.id]||""}
                    onChange={e=>setYanitlar(prev=>({...prev,[p.id]:e.target.value}))}
                    placeholder={isEditor?"Kullaniciya yanitinizi yazin...":"Editore yanit yazin..."}
                    style={{flex:1,padding:"8px 14px",border:`1.5px solid ${C.border}`,borderRadius:6,fontSize:13,outline:"none",background:"#fff",color:C.ink}}
                  />
                  <button onClick={()=>yanitGonder(p.id, p.from_email)}
                    style={{background:C.gold,color:C.ink,border:"none",padding:"8px 18px",borderRadius:6,cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                    YANIT GONDER
                  </button>
                </div>
              )}
            </div>
          );
        })
      }
    </div>
  );
}

              const txt=document.getElementById("upload-text");
              prog.style.display="block";
              let pct=0;const iv=setInterval(()=>{pct=Math.min(pct+10,85);bar.style.width=pct+"%";},200);
              const fname=`${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,"_")}`;
              const{error:ue}=await supa.storage.from("makaleler").upload(fname,file,{upsert:true});
              clearInterval(iv);
              if(ue){bar.style.width="100%";bar.style.background="#ef4444";txt.innerText="Dosya yuklenemedi: "+ue.message;btn.disabled=false;btn.innerText="MAKALEYi ARSiS'E GONDER";return;}
              bar.style.width="100%";bar.style.background="#16a34a";txt.innerText="Dosya basariyla yuklendi!";
              const{data:ud}=supa.storage.from("makaleler").getPublicUrl(fname);
              file_url=ud?.publicUrl;
            }
            const{error}=await supa.from("articles").insert([{title,field,abstract,keywords,coauthors,author:user.name,author_email:user.email,status:"beklemede",file_url}]);
            btn.disabled=false;btn.innerText="MAKALEYi ARSiS'E GONDER";
            if(error){toast_("Bir hata olustu.","err");return;}
            await loadArticles();
            sendMail(user.name,user.email,"article_received");
            sendMail(user.name,user.email,"article_notify");
            setModal(null);
            toast_("Makaleniz ARSiS'e iletildi!");
          }}>MAKALEYi ARSiS'E GONDER</button>
        </Modal>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
