    about_title:"About ARSIS",
    about_sub:"In Ancient Greek, \"ἄρσις\" — the rising note, the strong beat of rhythm. This journal crowns that ascent with academic inquiry.",
    scope_text:"ARSIS is a double-blind peer-reviewed open-access journal publishing original research in music, musicology, anthropology and ethnomusicology. Embracing an interdisciplinary approach, the journal hosts studies across a wide spectrum from the field to theory.",
    scope_long:"Music is one of humanity's most universal and most intimate forms of expression. Far beyond a mere aesthetic experience, music is the carrier of identity, memory, ritual, resistance and solidarity. This sonic universe — reborn, transformed and renewed across different geographies, faiths and generations — transcends boundaries through its cultural inclusivity. With this understanding, ARSIS treats music not only as an art form, but as a living practice through which communities express themselves, sustain their histories, and carry their legacy into the future. Our journal provides a platform for original research, fieldwork and interdisciplinary interpretations produced across the vast musical geography stretching from Anatolia to the Balkans, Central Asia to the Mediterranean.",

    scope_text:"Το ΑΡΣΙΣ είναι ένα επιστημονικό περιοδικό ανοιχτής πρόσβασης με διπλή τυφλή κρίση, που δημοσιεύει πρωτότυπες έρευνες στη μουσική, μουσικολογία, ανθρωπολογία και εθνομουσικολογία.",
    scope_long:"Η μουσική είναι μία από τις πιο καθολικές και πιο προσωπικές μορφές έκφρασης της ανθρωπότητας. Πολύ πέρα από μια αισθητική εμπειρία, η μουσική είναι φορέας ταυτότητας, μνήμης, τελετουργίας, αντίστασης και αλληλεγγύης. Αυτό το ηχητικό σύμπαν — που αναγεννάται, μετασχηματίζεται και αποκτά νόημα σε διαφορετικές γεωγραφίες, πίστεις και γενιές — υπερβαίνει τα σύνορα χάρη στην πολιτισμική του συμπεριληπτικότητα. Με αυτή την κατανόηση, το ΑΡΣΙΣ αντιμετωπίζει τη μουσική όχι μόνο ως τέχνη, αλλά ως ζωντανή πρακτική μέσω της οποίας οι κοινότητες εκφράζονται, διατηρούν την ιστορία τους και τη μεταφέρουν στο μέλλον. Το περιοδικό μας παρέχει πλατφόρμα για πρωτότυπη έρευνα και διεπιστημονικές ερμηνείες που παράγονται σε ολόκληρη τη μουσική γεωγραφία από την Ανατολία ως τα Βαλκάνια, από την Κεντρική Ασία ως τη Μεσόγειο.",

function YanitKutusu({postId, postFromEmail, isEditor, replyLabel, onYanitGonder}) {
  const inputId = `yanit-${postId}`;
  const gonder = async () => {
    const el = document.getElementById(inputId);
    if(!el || !el.value.trim()) return;
    const text = el.value;
    el.value = "";
    await onYanitGonder(postId, postFromEmail, text);
  };
  return (
    <div style={{background:C.paper,borderTop:`1px solid ${C.border}`,padding:"12px 22px",display:"flex",gap:10}}>
      <input
        id={inputId}
        placeholder={replyLabel}
        style={{flex:1,padding:"8px 14px",border:`1.5px solid ${C.border}`,borderRadius:6,fontSize:13,outline:"none",background:"#fff",color:C.ink}}
        onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();gonder();}}}
      />
      <button
        onClick={gonder}
        style={{background:C.gold,color:C.ink,border:"none",padding:"8px 18px",borderRadius:6,cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
        ↩ GÖNDER
      </button>
    </div>
  );
}

function MesajlarTab({user,toast_,t}) {
  const [posts,setPosts]=useState([]);

  useEffect(()=>{yukle();},[]);

  const yukle=async()=>{
    if(user.role==="editor"){
      const{data}=await supa.from("messages").select("*").order("created_at",{ascending:false});
      if(data)setPosts(data);
    } else {
      const{data}=await supa.from("messages").select("*").eq("from_email",user.email).order("created_at",{ascending:false});
      if(data){
        const anaIds=data.filter(p=>p.to_email==="forum").map(p=>p.id);
        if(anaIds.length>0){
          const{data:yanitlar}=await supa.from("messages").select("*").in("to_email",anaIds.map(id=>`reply_${id}`));
          setPosts([...data,...(yanitlar||[])]);
        } else setPosts(data);
      }
    }
  };

  const yanitGonder=async(postId,postFromEmail,text)=>{
    await supa.from("messages").insert([{from_name:user.name,from_email:user.email,to_email:`reply_${postId}`,subject:"Reply",content:text,read:false,reply_to_user:postFromEmail}]);
    yukle();toast_(t.reply_send+" ✓");
  };

  const isEditor=user?.role==="editor";
  const anaPostlar=posts.filter(p=>p.to_email==="forum").filter(p=>isEditor?true:p.from_email===user.email);
  const yanit=(id)=>posts.filter(p=>p.to_email===`reply_${id}`).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const okunmamis=isEditor?posts.filter(p=>p.to_email==="forum"&&!p.read).length:0;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <h3 style={{fontFamily:"'Cinzel',serif",margin:0,fontSize:17,letterSpacing:1,color:C.ink}}>{t.panel_messages.toUpperCase()}</h3>
        {isEditor&&okunmamis>0&&(
          <div style={{background:`${C.rust}15`,border:`1px solid ${C.rust}44`,borderRadius:8,padding:"8px 16px",display:"flex",alignItems:"center",gap:8}}>
            <span style={{background:C.rust,color:"#fff",borderRadius:"50%",width:22,height:22,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800}}>{okunmamis}</span>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.rust,letterSpacing:0.5}}>{t.unread}</span>
          </div>
        )}
      </div>
      <div style={{background:C.cream,borderRadius:12,padding:"20px 24px",marginBottom:28,border:`1px solid ${C.border}`}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.rust,letterSpacing:1.5,marginBottom:14}}>{t.new_msg}</div>
        <input id="msg-konu" placeholder="Konu / Subject *"
          style={{width:"100%",padding:"10px 14px",border:`1.5px solid ${C.border}`,borderRadius:6,fontSize:14,outline:"none",background:"#fff",color:C.ink,marginBottom:10,boxSizing:"border-box"}}/>
        <textarea id="msg-icerik" placeholder="Mesaj / Message *"
          style={{width:"100%",padding:"10px 14px",border:`1.5px solid ${C.border}`,borderRadius:6,fontSize:14,outline:"none",background:"#fff",color:C.ink,marginBottom:10,boxSizing:"border-box",height:90,resize:"vertical"}}/>
        <button onClick={async()=>{
          const konu = document.getElementById("msg-konu").value;
          const icerik = document.getElementById("msg-icerik").value;
          if(!konu.trim()||!icerik.trim()){toast_(t.submit_err,"err");return;}
          await supa.from("messages").insert([{from_name:user.name,from_email:user.email,to_email:"forum",subject:konu,content:icerik,read:false}]);
          document.getElementById("msg-konu").value="";
          document.getElementById("msg-icerik").value="";
          yukle();toast_(t.send+" ✓");
        }} style={{background:C.ink,color:C.gold,border:"none",padding:"10px 24px",borderRadius:7,cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,letterSpacing:1}}>{t.send}</button>
      </div>
      {anaPostlar.length===0
        ?<div style={{textAlign:"center",padding:"40px",color:C.muted,fontStyle:"italic"}}>{t.no_msg}</div>
        :anaPostlar.map(p=>{
          const unread=!p.read&&isEditor;
          return(
            <div key={p.id} style={{border:`1px solid ${unread?C.rust:C.border}`,borderRadius:12,marginBottom:16,overflow:"hidden",boxShadow:unread?`0 0 0 2px ${C.rust}22`:"none"}}>
              <div style={{background:unread?`${C.rust}06`:"#fff",padding:"18px 22px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,alignItems:"flex-start"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,color:C.ink}}>{p.subject}</span>
                    {unread&&<span style={{background:C.rust,color:"#fff",fontSize:9,padding:"2px 8px",borderRadius:20,fontWeight:700}}>NEW</span>}
                  </div>
                  <span style={{fontSize:11,color:C.muted,whiteSpace:"nowrap",marginLeft:12}}>{p.created_at?.split("T")[0]}</span>
                </div>
                {isEditor&&<div style={{fontSize:11,color:C.teal,marginBottom:6,fontWeight:600}}>{t.from} {p.from_name} ({p.from_email})</div>}
                <div style={{fontSize:12,color:C.muted,marginBottom:10,fontStyle:"italic"}}>— {p.from_name}</div>
                <p style={{margin:0,fontSize:14,color:"#444",lineHeight:1.75}}>{p.content}</p>
              </div>
              {yanit(p.id).length>0&&(
                <div style={{background:C.cream,borderTop:`1px solid ${C.border}`}}>
                  {yanit(p.id).map(r=>(
                    <div key={r.id} style={{padding:"12px 22px",borderBottom:`1px solid ${C.border}44`,background:r.from_email===user.email?"#fff":C.cream}}>
                      <div style={{fontSize:12,color:r.from_email===user.email?C.rust:C.teal,marginBottom:4,fontWeight:600}}>{r.from_name} · {r.created_at?.split("T")[0]}</div>
                      <p style={{margin:0,fontSize:13.5,color:"#444",lineHeight:1.7}}>{r.content}</p>
                    </div>
                  ))}
                </div>
              )}
              {(isEditor||p.from_email===user.email)&&(
                <YanitKutusu postId={p.id} postFromEmail={p.from_email} isEditor={isEditor} replyLabel={isEditor?t.user_reply:t.editor_reply} onYanitGonder={yanitGonder}/>
              )}
            </div>
          );
        })
      }
    </div>
  );
}

                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <h4 style={{fontFamily:"'Cinzel',serif",margin:"0 0 6px",fontSize:13.5,color:C.ink,flex:1,paddingRight:14}}>{a.title}</h4>
                      <span style={{background:sc.bg,color:sc.color,fontSize:10,padding:"4px 10px",borderRadius:20,fontWeight:700,whiteSpace:"nowrap"}}>{sc.label[lang]||sc.label.tr}</span>
                    </div>
                    <p style={{margin:0,fontSize:12.5,color:C.muted,fontStyle:"italic"}}>{a.created_at?.split("T")[0]} · {a.field}</p>
                  </div>
                );
              })}
            </div>
          )}
          {tab==="mesajlar"&&<MesajlarTab user={user} toast_={toast_} t={t}/>}
          {tab==="profil"&&(
            <div>
              <h3 style={{fontFamily:"'Cinzel',serif",margin:"0 0 26px",fontSize:17,letterSpacing:1,color:C.ink}}>{t.profile_title}</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                {[[t.profile_fields[0][0],user?.name],[t.profile_fields[1][0],user?.email],[t.profile_fields[2][0],user?.institution||"—"],[t.profile_fields[3][0],user?.orcid||"—"],[t.profile_fields[4][0],user?.role],[t.profile_fields[5][0],t.access]].map(([k,v])=>(
                  <div key={k} style={{background:C.cream,borderRadius:8,padding:"14px 18px",border:`1px solid ${C.border}`}}>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:C.muted,letterSpacing:1.5,marginBottom:5}}>{k.toUpperCase()}</div>
                    <div style={{fontSize:14.5,color:C.ink,fontWeight:600}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {tab==="yonetim"&&user?.role==="editor"&&(
            <div>
              <h3 style={{fontFamily:"'Cinzel',serif",margin:"0 0 24px",fontSize:17,letterSpacing:1,color:C.ink}}>{t.admin_title}</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:32}}>
                {[[t.total_articles,articles.length,C.gold],[t.pending,articles.filter(a=>a.status==="beklemede").length,"#1e40af"],[t.in_review,articles.filter(a=>a.status==="hakemde").length,C.rust],[t.total_members,users.length,C.teal]].map(([l,n,c])=>(
                  <div key={l} style={{background:`${c}12`,borderRadius:9,padding:"16px 12px",textAlign:"center",border:`1px solid ${c}30`}}>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:26,fontWeight:700,color:c}}>{n}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:3}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{marginBottom:32}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.ink,letterSpacing:1,marginBottom:14,fontWeight:700}}>{t.sent_articles}</div>
                {articles.length===0?<p style={{color:C.muted,fontStyle:"italic",fontSize:14}}>{t.no_sent}</p>:
                  articles.map(a=>{
                    const sc=STATUS[a.status]||{};
                    return(
                      <div key={a.id} style={{border:`1px solid ${C.border}`,borderRadius:9,padding:"14px 18px",marginBottom:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                          <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.ink,flex:1,paddingRight:12}}>{a.title}</div>
                          <select value={a.status} onChange={async e=>{await supa.from("articles").update({status:e.target.value}).eq("id",a.id);await loadArticles();toast_(t.status_update);}} style={{fontSize:11,padding:"3px 8px",borderRadius:6,border:`1px solid ${C.border}`,background:sc.bg,color:sc.color,fontWeight:700,cursor:"pointer"}}>
                            {Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.label[lang]||v.label.tr}</option>)}
                          </select>
                        </div>
                        <div style={{fontSize:12,color:C.muted,fontStyle:"italic"}}>{a.author} · {a.author_email} · {a.field} · {a.created_at?.split("T")[0]}</div>
                        {a.file_url&&<a href={a.file_url} target="_blank" style={{fontSize:12,color:C.teal,marginTop:4,display:"inline-block"}}>📄 {t.download}</a>}
                      </div>
                    );
                  })
                }
              </div>
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:12,color:C.ink,letterSpacing:1,marginBottom:14,fontWeight:700}}>{t.members}</div>
                {users.length===0?<p style={{color:C.muted,fontStyle:"italic",fontSize:14}}>{t.no_members}</p>:
                  users.map(u=>(
                    <div key={u.id} style={{border:`1px solid ${C.border}`,borderRadius:9,padding:"12px 18px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.ink}}>{u.name}</div>
                        <div style={{fontSize:12,color:C.muted,fontStyle:"italic"}}>{u.email} · {u.institution||"—"}</div>
                      </div>
                      <span style={{fontSize:10,padding:"3px 10px",borderRadius:20,background:`${C.gold}20`,color:C.rust,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{u.role?.toUpperCase()}</span>
                    </div>
                  ))
                }
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );

  const Footer=()=>(
    <footer style={{background:C.ink,borderTop:`2px solid ${C.gold}44`}}>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"44px 28px 28px",display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:36}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <WaveLogo size={22}/><div style={{fontFamily:"'Cinzel',serif",fontWeight:900,fontSize:18,color:C.gold,letterSpacing:3}}>{t.title}</div>
          </div>
          <p style={{margin:"0 0 8px",fontSize:12.5,color:"#8a7d60",lineHeight:1.7,fontStyle:"italic"}}>"{t.footer_motto}"</p>
          <p style={{margin:0,fontSize:11.5,color:"#5a4e3a"}}>{t.oa_policy} · CC BY 4.0</p>
        </div>
        {t.footer_cols.map(([title,items])=>(
          <div key={title}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.gold,letterSpacing:2,marginBottom:14,fontWeight:700}}>{title.toUpperCase()}</div>
            {items.map(item=>{
              const guideLabels=[t.guide_page,t.guide,"Author Guidelines","Yazım Kuralları","Οδηγίες","Οδηγίες Συγγραφής"];
              const ethicsLabels=[t.ethics_page,"Etik İlkeler","Ethics","Δεοντολογία"];
              const homeLabels=["Ana Sayfa","Home","Αρχική"];
              const archiveLabels=["Arşiv","Archive","Αρχείο"];
              const oaLabels=["Açık Erişim","Open Access","Ανοιχτή Πρόσβαση"];
              const submitLabels=["Makale Gönder","Submit Article","Υποβολή"];
              let onClick=undefined;
              if(guideLabels.includes(item)) onClick=()=>setPage("yazim-kurallari");
              else if(ethicsLabels.includes(item)) onClick=()=>setPage("etik-ilkeler");
              else if(homeLabels.includes(item)) onClick=()=>setPage("anasayfa");
              else if(archiveLabels.includes(item)) onClick=()=>setPage("arsiv");
              else if(oaLabels.includes(item)) onClick=()=>setPage("acik-erisim");
              else if(submitLabels.includes(item)) onClick=()=>user?setModal("makale"):setModal("login");
              return(
                <div key={item} onClick={onClick} style={{fontSize:12.5,color:onClick?"#c4b896":"#7a6e5f",marginBottom:7,cursor:onClick?"pointer":"default",transition:"color 0.2s"}}
                  onMouseEnter={e=>{if(onClick)e.target.style.color=C.goldL}}
                  onMouseLeave={e=>{if(onClick)e.target.style.color="#c4b896"}}>
                  {item}
                </div>
              );
            })}
          </div>
        ))}
      </div>
      <div style={{borderTop:`1px solid ${C.gold}22`,padding:"18px 28px",display:"flex",justifyContent:"space-between"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#5a4e3a",letterSpacing:1.5}}>{t.copyright}</div>
        <div style={{fontSize:11,color:"#5a4e3a",fontStyle:"italic"}}>ἄρσις</div>
      </div>
    </footer>
  );

  return(
    <div style={{background:C.paper,minHeight:"100vh"}}>
      <Nav/>
      {page==="anasayfa"&&<Home/>}
      {page==="arsiv"&&<Archive/>}
      {page==="hakkinda"&&<About/>}
      {page==="acik-erisim"&&<OpenAccess/>}
      {page==="yazim-kurallari"&&<GuidelinesPage/>}
      {page==="etik-ilkeler"&&<EthicsPage/>}
      {page==="panel"&&user&&<Panel/>}
      <Footer/>

      {toast&&(
        <div style={{position:"fixed",bottom:28,right:28,background:toast.type==="err"?"#7f1d1d":C.ink,color:toast.type==="err"?"#fca5a5":C.gold,padding:"14px 24px",borderRadius:10,fontWeight:600,fontSize:14,zIndex:500,boxShadow:"0 8px 24px rgba(0,0,0,0.35)",maxWidth:360}}>
          {toast.type==="err"?"⚠ ":"♩ "}{toast.msg}
        </div>
      )}

      {modal==="login"&&(
        <Modal title={t.login_title} onClose={()=>setModal(null)}>
          <input style={INP} id="l-email" placeholder={t.email_ph}/>
          <input style={INP} id="l-pass" type="password" placeholder={t.pass_ph}/>
          <button style={BTN} onClick={async()=>{
            const email=document.getElementById("l-email").value;
            const password=document.getElementById("l-pass").value;
            const{data}=await supa.from("users").select("*").eq("email",email).maybeSingle();
            if(data&&data.password===password){setUser(data);setModal(null);toast_(`${t.welcome.split("!")[0]}, ${data.name.split(" ").slice(-1)[0]}!`);}
            else toast_(t.login_err,"err");
          }}>{t.login_btn}</button>
          <p style={{textAlign:"center",marginTop:16,fontSize:13.5,color:C.muted}}>{t.no_account} <span style={{color:C.rust,cursor:"pointer",fontWeight:600}} onClick={()=>setModal("register")}>{t.register_link}</span></p>
        </Modal>
      )}

      {modal==="register"&&(
        <Modal title={t.register_title} sub={`${t.title} — ${t.free}`} onClose={()=>setModal(null)}>
          <input style={INP} id="r-name" placeholder={t.name_ph}/>
          <input style={INP} id="r-email" placeholder={t.email_ph}/>
          <input style={INP} id="r-inst" placeholder={t.inst_ph}/>
          <input style={INP} id="r-orcid" placeholder={t.orcid_ph}/>
          <select style={INP} id="r-role">
            <option value="yazar">{t.role_author}</option>
            <option value="hakem">{t.role_reviewer}</option>
          </select>
          <input style={INP} id="r-pass" type="password" placeholder={t.pass_ph}/>
          <button style={BTN} onClick={async()=>{
            const name=document.getElementById("r-name").value;
            const email=document.getElementById("r-email").value;
            const institution=document.getElementById("r-inst").value;
            const orcid=document.getElementById("r-orcid").value;
            const role=document.getElementById("r-role").value;
            const password=document.getElementById("r-pass").value;
            if(!name||!email){toast_(t.required_fields,"err");return;}
            if(!password){toast_(t.required_pass,"err");return;}
            const{data,error}=await supa.from("users").insert([{name,email,institution,orcid,role,password}]).select().single();
            if(error){toast_(t.email_taken,"err");return;}
            setUser(data);await loadUsers();setModal(null);
            toast_(t.welcome);
            sendMail(name,email,"notify");
          }}>{t.register_free}</button>
        </Modal>
      )}

      {modal==="makale"&&(
        <Modal title={t.submit_title} sub={`${t.title} — ${t.oa_policy}`} onClose={()=>setModal(null)}>
          <input style={INP} id="a-title" placeholder={`${lang==="tr"?"Makale Başlığı":lang==="en"?"Article Title":"Τίτλος Άρθρου"} *`}/>
          <select style={INP} id="a-field">
            <option value="">{t.fields_select}</option>
            {t.fields.map(f=><option key={f.name} value={f.name}>{f.name}</option>)}
          </select>
          <input style={INP} id="a-coauth" placeholder={t.coauth}/>
          <textarea style={{...INP,height:100,resize:"vertical"}} id="a-abstract" placeholder={t.abstract_ph}/>
          <input style={INP} id="a-kw" placeholder={t.keywords_ph}/>
          <div style={{marginBottom:12}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:C.muted,letterSpacing:1.5,marginBottom:6}}>{t.file_label}</div>
            <input type="file" id="a-file" accept=".pdf,.doc,.docx" style={{width:"100%",padding:"10px 14px",border:`1.5px solid ${C.border}`,borderRadius:6,fontSize:13,background:C.paper,color:C.ink,cursor:"pointer"}}/>
          </div>
          <div id="upload-progress" style={{display:"none",marginBottom:12}}>
            <div style={{background:C.cream,borderRadius:6,height:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
              <div id="upload-bar" style={{height:"100%",background:C.gold,width:"0%",transition:"width 0.3s,background 0.5s",borderRadius:6}}/>
            </div>
            <div id="upload-text" style={{fontSize:12,color:C.muted,marginTop:5,textAlign:"center",fontStyle:"italic"}}>⏳ {t.uploading}</div>
          </div>
          <button id="submit-btn" style={BTN} onClick={async()=>{
            const title=document.getElementById("a-title").value;
            const field=document.getElementById("a-field").value;
            const abstract=document.getElementById("a-abstract").value;
            const keywords=document.getElementById("a-kw").value;
            const coauthors=document.getElementById("a-coauth").value;
            const file=document.getElementById("a-file").files?.[0];
            if(!title||!abstract||!field){toast_(t.submit_err,"err");return;}
            const btn=document.getElementById("submit-btn");
            btn.disabled=true;btn.innerText=t.sending;
            let file_url=null;
            if(file){
              const prog=document.getElementById("upload-progress");
              const bar=document.getElementById("upload-bar");
              const txt=document.getElementById("upload-text");
              prog.style.display="block";
              let pct=0;const iv=setInterval(()=>{pct=Math.min(pct+10,85);bar.style.width=pct+"%";},200);
              const fname=`${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,"_")}`;
              const{error:ue}=await supa.storage.from("makaleler").upload(fname,file,{upsert:true});
              clearInterval(iv);
              if(ue){bar.style.width="100%";bar.style.background="#ef4444";txt.innerText=t.upload_err+ue.message;btn.disabled=false;btn.innerText=t.submit_btn;return;}
              bar.style.width="100%";bar.style.background="#16a34a";txt.innerText="✅ "+t.uploaded;
              const{data:ud}=supa.storage.from("makaleler").getPublicUrl(fname);
              file_url=ud?.publicUrl;
            }
            const{error}=await supa.from("articles").insert([{title,field,abstract,keywords,coauthors,author:user.name,author_email:user.email,status:"beklemede",file_url}]);
            btn.disabled=false;btn.innerText=t.submit_btn;
            if(error){toast_(t.login_err,"err");return;}
            await loadArticles();
            sendMail(user.name,user.email,"article_received");
            sendMail(user.name,user.email,"article_notify");
            setModal(null);
            toast_(t.submit_success);
          }}>{t.submit_btn}</button>
        </Modal>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
